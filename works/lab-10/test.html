<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello Bulma!</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
  </head>
  <body>
  <section class="section">
    <div class="container">
      <h1 class="title">
        Hello World
      </h1>

      <p>Para poder utilizar este calculador solo debes de ingresar el número de discos que quieres que el problema tenga. Se va a asumir la posición de inicio es el lado izquierdo y la final es el derecho.</p>

<form action="/test" method="POST">
  
<div class="field">
  <label class="label">Número</label>
    <input class="input" type="text" placeholder="Número" name="value">
</div>

<div class="field is-grouped">
    <button type="submit" class="button is-link">Submit</button>
</div>

</form>

                <div class="buttons mt-4">
<form action="/view" method="GET">
  <button type="submit" class="button is-link">View full</button>
</form>
                </div>
    </div>
  </section>
  </body>
</html>
